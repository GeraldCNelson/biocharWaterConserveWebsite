<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Biochar Project</title>

  <!-- Core CSS -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap.min.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}"/>
  <link rel="icon" href="{{ url_for('static', path='images/favicon.ico') }}"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <!-- Datepicker CSS -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/bootstrap-datepicker.min.css') }}"/>

  <!-- Vendor JS (classic, order matters) -->
  <script src="{{ url_for('static', path='js/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/vendor/popper.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/vendor/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/vendor/bootstrap-datepicker.min.js') }}"></script>
  <script src="{{ url_for('static', path='js/vendor/tippy.min.js') }}"></script>

  <!-- Plotly & Markdown -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="{{ url_for('static', path='js/vendor/marked.min.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script>

  <!-- Tippy init -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      tippy("[data-tippy-content]", {
        theme: "light",
        animation: "scale",
        arrow: true,
      });
    });
  </script>

  <!-- Custom season defaults -->
  <script>
    window.CUSTOM_GSEASON_CONFIG = {
      defaultYear:    {{ DEFAULT_YEAR }},
      years:          {{ YEARS | tojson }},
      defaultPeriods: {{ DEFAULT_GSEASON_PERIODS | tojson }}
    };
  </script>

  <!-- 🚨 SINGLE ES MODULE ENTRYPOINT -->
  <script type="module"
          src="{{ url_for('static', path='js/main.js') }}"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true
      },
      options: { renderActions: { addMenu: [] } }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>

<body>
<div class="container-fluid mt-4">

  <!-- Tabs -->
  <ul class="nav nav-tabs" role="tablist">
    <!-- (unchanged tab markup — omitted here for brevity) -->
  </ul>

  <div class="tab-content">

    <!-- Biomass (Field Samples) -->
    <div class="tab-pane fade" id="biomass-field"
         role="tabpanel" aria-labelledby="biomass-field-tab">
      <div class="container-fluid mt-3">
        <h4 class="mb-2">Biomass (Field Samples)</h4>
        <p class="text-muted mb-2">
          Rows: field locations. Columns: sampling dates.
        </p>
        <div class="nir-scroll">
          <div id="biomass-field-content" class="nir-content"></div>
        </div>
      </div>
    </div>

    <!-- (all other panes unchanged) -->

  </div>
</div>

</body>
</html>
